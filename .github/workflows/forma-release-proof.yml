name: Forma Release Proof

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  proof-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      - run: corepack pnpm proof:release
      - name: Capture installed package smoke summary
        shell: bash
        run: |
          set -o pipefail
          corepack pnpm packages:installed-smoke | tee installed-package-smoke.log
          grep -E '"installedPackageSmokeSummary"|"installedPackageSmokeFailureSummary"' installed-package-smoke.log > installed-package-smoke-summary.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forma-release-proof-artifacts
          path: |
            installed-package-smoke.log
            installed-package-smoke-summary.jsonl
          if-no-files-found: ignore
