name: Publish Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-forma-lang:
    name: Publish forma-lang to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build packages/forma-python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/forma-python/dist
