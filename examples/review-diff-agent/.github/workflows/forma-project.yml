name: Forma Project

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: corepack enable
      - run: pnpm install
      - run: python -m pip install -e .
      - run: forma project-check .
      - run: pnpm run check
      - run: python -m py_compile src/review_diff_forma.py src/review_diff_agent.py test/review_diff_agent_smoke.py
      - run: pnpm run smoke:ts
      - run: python test/review_diff_agent_smoke.py
