name: Forma package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  forma-package:
    name: examples/function-repair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Forma CLI
        run: npm install --global @forma-lang/cli
      - name: Check package manifest
        run: forma package-check repair_function.forma.pkg.json
      - name: Check package lock
        run: forma package-lock repair_function.forma.pkg.json --output repair_function.forma.lock.json --check
      - name: Run TypeScript package tests
        run: npx vitest run repair_function_contract.test.ts repair_function_trace.test.ts
      - name: Run Python contract test
        run: python repair_function_contract_test.py
      - name: Run Python trace test
        run: python repair_function_trace_test.py
      - name: Write stale package lock report
        if: failure()
        run: forma package-lock repair_function.forma.pkg.json --output repair_function.forma.lock.json --check --json > stale-package-lock-report.json || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stale-package-lock-report
          path: stale-package-lock-report.json
      - name: Run eval suite
        run: forma eval-suite forma.eval.json --summary > candidate.json
      - name: Review package
        run: forma package-review repair_function.forma.pkg.json
      - name: Troubleshoot package failures
        if: failure()
        run: echo "See docs/guides/package-consumer-quickstart.md#troubleshooting"
      - uses: actions/upload-artifact@v4
        with:
          name: forma-candidate
          path: candidate.json
