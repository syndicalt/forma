name: Forma package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  forma-package:
    name: examples/review-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Forma CLI
        run: npm install --global @forma-lang/cli
      - name: Check package manifest
        run: forma package-check review_diff.forma.pkg.json
      - name: Check package lock
        run: forma package-lock review_diff.forma.pkg.json --output review_diff.forma.lock.json --check
      - name: Write stale package lock report
        if: failure()
        run: forma package-lock review_diff.forma.pkg.json --output review_diff.forma.lock.json --check --json > stale-package-lock-report.json || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stale-package-lock-report
          path: stale-package-lock-report.json
      - name: Run TypeScript package tests
        run: npx vitest run review_diff_decision.test.ts tool_permission_workflow.test.ts review_diff_contract.test.ts review_diff_migration.test.ts
      - name: Run Python package test
        run: python review_diff_decision_test.py
      - name: Run Python package test
        run: python tool_permission_workflow_test.py
      - name: Run Python package test
        run: python review_diff_contract_test.py
      - name: Run Python package test
        run: python review_diff_migration_test.py
      - name: Run eval suite
        run: forma eval-suite forma.eval.json --summary > candidate.json
      - name: Review package
        run: forma package-review review_diff.forma.pkg.json
      - name: Review migration parity proof
        run: forma package-review review_diff.forma.pkg.json --proof-command "npx vitest run review_diff_migration.test.ts && python review_diff_migration_test.py"
      - name: Troubleshoot package failures
        if: failure()
        run: echo "See docs/guides/package-consumer-quickstart.md#troubleshooting"
      - uses: actions/upload-artifact@v4
        with:
          name: forma-candidate
          path: candidate.json
